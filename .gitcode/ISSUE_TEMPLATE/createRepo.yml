name: 创建仓库申请
description: 申请在community仓库中新建软件包仓库
title: "[建仓申请] "
body:
  - type: input
    id: repo_name
    attributes:
      label: 仓库名称
      description: 请输入要创建的仓库名称（仅支持小写字母、数字和连字符）
      placeholder: "例如: my-package"
    validations:
      required: true

  - type: input
    id: upstream
    attributes:
      label: 上游仓库地址(如无上游社区反馈不涉及)
      description: 上游仓库地址，格式如 https://gitcode.com/org/repo 或 https://github.com/org/repo
      placeholder: "例如: https://gitcode.com/upstream-org/upstream-repo"
    validations:
      required: false

  - type: textarea
    id: repo_description
    attributes:
      label: 仓库描述
      description: 请输入仓库的描述信息
      placeholder: "例如: My Package for BoostKit"
    validations:
      required: true

  - type: textarea
    id: repo_pr
    attributes:
      label: 建仓PR
      description: 请输入建仓PR链接
      placeholder: "例如: https://gitcode.com/boostkit/community/pull/xxx"
    validations:
      required: true

  - type: dropdown
    id: repo_type
    attributes:
      label: 仓库类型
      description: 选择仓库的公开类型
      options:
        - public
        - private
    validations:
      required: true

  - type: dropdown
    id: repo_type
    attributes:
      label: 仓库形态
      description: 选择仓库的类型
      options:
        - 源码仓
        - 补丁仓
        - 公共配置或工具仓
    validations:
      required: true

  - type: dropdown
    id: repo_type
    attributes:
      label: 开源类型
      description: 选择仓库开源的类型
      options:
        - 主导开源
        - 参与开源
    validations:
      required: true

  - type: input
    id: sig_name
    attributes:
      label: 所属SIG组
      description: 请输入仓库所属的SIG组名称
      placeholder: "例如: BoostCore"
    validations:
      required: true

  - type: input
    id: branch_1
    attributes:
      label: 创建分支 1
      description: "提示：master 分支默认创建，无需填写。如需创建其他分支，请在以下输入框中填写，格式：分支名:来源分支（不指定来源分支时，默认源分支为 master）"
      placeholder: "例如: 分支1:master"
    validations:
      required: false


